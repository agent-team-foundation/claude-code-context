name: Sync First Tree Skill

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync skill from upstream
        run: bash ./.scripts/sync-first-tree-skill.sh

      - name: Commit if changed
        run: |
          git add .skills/first-tree-cli-framework .claude/skills/first-tree-cli-framework .agents/skills/first-tree-cli-framework
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync first-tree skill"
          git push
