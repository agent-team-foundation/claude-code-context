name: Validate Tree

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".agents/skills/first-tree/**"
      - ".claude/skills/first-tree/**"
      - ".claude/settings.json"
      - ".github/workflows/validate.yml"
      - ".scripts/sync-first-tree-skill.sh"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Clone latest first-tree
        run: git clone --depth=1 https://github.com/agent-team-foundation/first-tree.git "$RUNNER_TEMP/first-tree"

      - name: Install first-tree
        working-directory: ${{ runner.temp }}/first-tree
        run: pnpm install --frozen-lockfile

      - name: Build first-tree CLI
        working-directory: ${{ runner.temp }}/first-tree
        run: pnpm build

      - name: Validate tree
        working-directory: ${{ runner.temp }}/first-tree
        run: node dist/cli.js verify --tree-path "$GITHUB_WORKSPACE"
